<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People Counter — CCTV AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3044;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 1rem; color: #38bdf8; font-weight: 600; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #1e3a5f; color: #6b7280; cursor: not-allowed; transform: none; }
    .btn-danger  { background: #dc2626; color: #fff; padding: 6px 12px; font-size: 0.78rem; }
    .btn-danger:hover  { background: #ef4444; }
    .btn-ghost   { background: #2d3044; color: #d1d5db; }
    .btn-ghost:hover   { background: #374151; }
    .btn-icon {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .btn-icon:hover { color: #f87171; background: rgba(248,113,113,0.1); }

    /* ── Empty state ── */
    #emptyState {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: #4b5563;
      padding: 40px;
    }
    #emptyState.hidden { display: none; }
    .empty-icon { font-size: 3.5rem; }
    #emptyState h2 { font-size: 1.2rem; color: #6b7280; }
    #emptyState p  { font-size: 0.9rem; }

    /* ── Camera grid ── */
    #cameraGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 16px;
      padding: 16px;
      align-content: start;
    }

    /* ── Camera card ── */
    .cam-card {
      background: #1a1d27;
      border: 1px solid #2d3044;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .cam-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid #2d3044;
      gap: 8px;
    }
    .cam-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cam-header-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    /* video wrapper */
    .cam-video-wrapper {
      position: relative;
      background: #000;
      line-height: 0;
    }
    .cam-feed {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      object-fit: contain;
      background: #000;
    }

    /* SVG garis hitung — overlay di atas video */
    .cam-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      user-select: none;
    }
    .cam-svg .line-hit {
      stroke: transparent;
      stroke-width: 20;
      fill: none;
      cursor: move;
    }
    .cam-svg .count-line {
      stroke: rgba(255, 255, 80, 0.75);
      stroke-width: 2.5;
      stroke-linecap: round;
      fill: none;
      pointer-events: none;
      transition: stroke 0.1s;
    }
    .cam-svg .count-line.dragging {
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 3;
    }
    .cam-svg .endpoint {
      fill: rgba(255, 230, 50, 0.9);
      stroke: rgba(0, 0, 0, 0.4);
      stroke-width: 1;
      cursor: grab;
      transition: fill 0.1s, r 0.1s;
    }
    .cam-svg .endpoint:hover {
      fill: #fff;
    }
    .cam-svg .endpoint.dragging {
      cursor: grabbing;
      fill: #fff;
    }

    /* stats bar */
    .cam-stats {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 10px 14px;
      border-top: 1px solid #2d3044;
    }
    .stat-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-item + .stat-item {
      border-left: 1px solid #2d3044;
    }
    .stat-item-label { font-size: 0.65rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-item-val   { font-size: 1.3rem; font-weight: 700; line-height: 1.2; }
    .val-total { color: #fff; }
    .val-right { color: #4ade80; }
    .val-left  { color: #60a5fa; }

    .cam-status {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 14px 10px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4b5563;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .status-dot.live  { background: #4ade80; animation: pulse 2s infinite; }
    .status-dot.error { background: #f87171; }
    .status-label { font-size: 0.72rem; color: #6b7280; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes flash { 0%{opacity:.4} 100%{opacity:1} }
    .flash { animation: flash 0.35s ease-out; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #1a1d27;
      border: 1px solid #2d3044;
      border-radius: 14px;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #2d3044;
    }
    .modal-header h2 { font-size: 1rem; color: #e0e0e0; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid #2d3044;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.8rem; color: #9ca3af; }
    .form-label .req { color: #f87171; }
    .form-input {
      background: #0f1117;
      border: 1px solid #2d3044;
      border-radius: 8px;
      padding: 9px 12px;
      color: #e0e0e0;
      font-size: 0.88rem;
      width: 100%;
      transition: border-color 0.15s;
    }
    .form-input:focus { outline: none; border-color: #3b82f6; }
    .form-input::placeholder { color: #4b5563; }
    select.form-input { cursor: pointer; }

    .form-hint {
      font-size: 0.75rem;
      color: #4b5563;
    }

    .form-error {
      font-size: 0.8rem;
      color: #f87171;
      padding: 8px 12px;
      background: rgba(248,113,113,0.1);
      border-radius: 6px;
      display: none;
    }
    .form-error.visible { display: block; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
    </svg>
    <h1>People Counter &mdash; CCTV AI</h1>
  </div>
  <button class="btn btn-primary" onclick="showModal()">+ Tambah Kamera</button>
</header>

<!-- ── Empty state ── -->
<div id="emptyState" class="hidden">
  <div class="empty-icon">📷</div>
  <h2>Belum ada kamera</h2>
  <p>Tambahkan kamera CCTV Anda untuk mulai menghitung</p>
  <button class="btn btn-primary" onclick="showModal()">+ Tambah Kamera</button>
</div>

<!-- ── Camera grid ── -->
<div id="cameraGrid"></div>

<!-- ── Modal tambah kamera ── -->
<div id="modal" class="modal-overlay hidden" onclick="onModalBgClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Tambah Kamera Baru</h2>
      <button class="btn-icon" onclick="closeModal()" title="Tutup">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">URL RTSP <span class="req">*</span></label>
        <input id="inputUrl" class="form-input" type="text"
               placeholder="rtsp://user:password@192.168.1.x/stream">
      </div>
      <div class="form-group">
        <label class="form-label">Nama Kamera</label>
        <input id="inputLabel" class="form-input" type="text"
               placeholder="Depan Rumah">
      </div>
      <div class="form-group">
        <label class="form-label">Posisi Awal Garis</label>
        <select id="inputPreset" class="form-input">
          <option value="vertical">Vertikal — tengah</option>
          <option value="horizontal">Horizontal — tengah</option>
          <option value="diagonal-nw">Diagonal &#x2198; (kiri-atas ke kanan-bawah)</option>
          <option value="diagonal-ne">Diagonal &#x2199; (kanan-atas ke kiri-bawah)</option>
        </select>
        <span class="form-hint">Posisi dapat diubah dengan drag setelah kamera ditambahkan.</span>
      </div>
      <div id="formError" class="form-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>
      <button class="btn btn-primary" id="btnAdd" onclick="submitAdd()">+ Tambah</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ─────────────────────────────────────────────────────────────────────
// cameras: { [id]: { es, x1, y1, x2, y2, drag, dragStart } }
const cameras = {};
const grid    = document.getElementById('cameraGrid');
const EP_R    = 7;   // endpoint circle radius px
const HIT_TOL = 14;  // px tolerance untuk hit test

// ── Preset → P1/P2 ───────────────────────────────────────────────────────────
const PRESETS = {
  'vertical':    { x1: 0.5, y1: 0.0, x2: 0.5, y2: 1.0 },
  'horizontal':  { x1: 0.0, y1: 0.5, x2: 1.0, y2: 0.5 },
  'diagonal-nw': { x1: 0.0, y1: 0.0, x2: 1.0, y2: 1.0 },
  'diagonal-ne': { x1: 1.0, y1: 0.0, x2: 0.0, y2: 1.0 },
};

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const list = await fetch('/cameras').then(r => r.json()).catch(() => []);
  list.forEach(cam => mountCard(cam.id, cam.label, cam.x1, cam.y1, cam.x2, cam.y2));
  updateEmpty();
})();

// ── Empty state ───────────────────────────────────────────────────────────────
function updateEmpty() {
  const empty = document.getElementById('emptyState');
  empty.classList.toggle('hidden', grid.children.length > 0);
}

// ── Card: mount ───────────────────────────────────────────────────────────────
function mountCard(id, label, x1, y1, x2, y2) {
  const card = document.createElement('div');
  card.className = 'cam-card';
  card.id = `cam-${id}`;
  card.innerHTML = cardHTML(id, label);
  grid.appendChild(card);

  cameras[id] = { es: null, x1, y1, x2, y2, drag: null, dragStart: null };
  // Defer SVG update until element is in layout
  requestAnimationFrame(() => updateSVGLine(id));
  setupSVGDrag(id);
  setupSSE(id);
  updateEmpty();
}

function cardHTML(id, label) {
  return `
    <div class="cam-header">
      <span class="cam-label" title="${escHtml(label)}">${escHtml(label)}</span>
      <div class="cam-header-actions">
        <button class="btn btn-danger" onclick="resetCam('${id}')">&#x21BA; Reset</button>
        <button class="btn-icon" onclick="removeCam('${id}')" title="Hapus kamera">&#x2715;</button>
      </div>
    </div>
    <div class="cam-video-wrapper">
      <img class="cam-feed" id="feed-${id}" src="/cameras/${id}/feed" alt="Loading...">
      <svg class="cam-svg" id="svg-${id}" xmlns="http://www.w3.org/2000/svg">
        <line id="svghit-${id}"  class="line-hit"   x1="0" y1="0" x2="0" y2="0"/>
        <line id="svgline-${id}" class="count-line" x1="0" y1="0" x2="0" y2="0"/>
        <circle id="svgp1-${id}" class="endpoint" cx="0" cy="0" r="${EP_R}"/>
        <circle id="svgp2-${id}" class="endpoint" cx="0" cy="0" r="${EP_R}"/>
      </svg>
    </div>
    <div class="cam-stats">
      <div class="stat-item">
        <span class="stat-item-label">Total</span>
        <span class="stat-item-val val-total" id="s-total-${id}">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-item-label">Kanan / Bawah &#x25B6;</span>
        <span class="stat-item-val val-right" id="s-right-${id}">—</span>
      </div>
      <div class="stat-item">
        <span class="stat-item-label">&#x25C0; Kiri / Atas</span>
        <span class="stat-item-val val-left" id="s-left-${id}">—</span>
      </div>
    </div>
    <div class="cam-status">
      <div class="status-dot" id="dot-${id}"></div>
      <span class="status-label" id="status-${id}">Menghubungkan...</span>
    </div>`;
}

// ── Card: remove ──────────────────────────────────────────────────────────────
function unmountCard(id) {
  cameras[id]?.es?.close();
  delete cameras[id];
  document.getElementById(`feed-${id}`)?.setAttribute('src', '');
  document.getElementById(`cam-${id}`)?.remove();
  updateEmpty();
}

async function removeCam(id) {
  if (!confirm('Hapus kamera ini?')) return;
  unmountCard(id);
  await fetch(`/cameras/${id}`, { method: 'DELETE' });
}

// ── Card: reset ───────────────────────────────────────────────────────────────
function resetCam(id) {
  fetch(`/cameras/${id}/reset`, { method: 'POST' });
}

// ── SSE: real-time stats ──────────────────────────────────────────────────────
function setupSSE(id) {
  const es = new EventSource(`/cameras/${id}/stats`);
  cameras[id].es = es;

  es.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.removed) { unmountCard(id); return; }

    setStatVal(`s-total-${id}`, d.total);
    setStatVal(`s-right-${id}`, d.right);
    setStatVal(`s-left-${id}`,  d.left);

    const dot    = document.getElementById(`dot-${id}`);
    const status = document.getElementById(`status-${id}`);
    if (dot)    dot.className     = 'status-dot live';
    if (status) status.textContent = 'Live';
  };

  es.onerror = () => {
    const dot    = document.getElementById(`dot-${id}`);
    const status = document.getElementById(`status-${id}`);
    if (dot)    dot.className     = 'status-dot error';
    if (status) status.textContent = 'Koneksi terputus...';
  };
}

function setStatVal(elId, val) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (el.textContent !== String(val)) {
    el.textContent = val;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }
}

// ── SVG: update posisi garis dari state ───────────────────────────────────────
function updateSVGLine(id) {
  const state = cameras[id];
  const svg   = document.getElementById(`svg-${id}`);
  if (!svg || !state) return;

  const W = svg.clientWidth;
  const H = svg.clientHeight;
  if (!W || !H) return;

  const x1px = state.x1 * W, y1px = state.y1 * H;
  const x2px = state.x2 * W, y2px = state.y2 * H;

  const hit  = document.getElementById(`svghit-${id}`);
  const line = document.getElementById(`svgline-${id}`);
  const p1   = document.getElementById(`svgp1-${id}`);
  const p2   = document.getElementById(`svgp2-${id}`);

  [hit, line].forEach(el => {
    if (!el) return;
    el.setAttribute('x1', x1px); el.setAttribute('y1', y1px);
    el.setAttribute('x2', x2px); el.setAttribute('y2', y2px);
  });
  if (line) line.classList.toggle('dragging', state.drag === 'line');
  if (p1) { p1.setAttribute('cx', x1px); p1.setAttribute('cy', y1px); p1.classList.toggle('dragging', state.drag === 'p1'); }
  if (p2) { p2.setAttribute('cx', x2px); p2.setAttribute('cy', y2px); p2.classList.toggle('dragging', state.drag === 'p2'); }
}

// ── SVG: drag logic ───────────────────────────────────────────────────────────
function dist(ax, ay, bx, by) {
  return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
}

function distToSeg(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return dist(px, py, x1, y1);
  const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / len2));
  return dist(px, py, x1 + t * dx, y1 + t * dy);
}

function getSVGPoint(e, svg) {
  const r = svg.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top, w: r.width, h: r.height };
}

function setupSVGDrag(id) {
  const svg = document.getElementById(`svg-${id}`);
  if (!svg) return;

  svg.addEventListener('mousedown', (e) => {
    const state = cameras[id];
    if (!state) return;
    const { x, y, w, h } = getSVGPoint(e, svg);

    const x1px = state.x1 * w, y1px = state.y1 * h;
    const x2px = state.x2 * w, y2px = state.y2 * h;

    const dp1 = dist(x, y, x1px, y1px);
    const dp2 = dist(x, y, x2px, y2px);
    const dl  = distToSeg(x, y, x1px, y1px, x2px, y2px);

    if (dp1 <= HIT_TOL) {
      state.drag = 'p1';
    } else if (dp2 <= HIT_TOL) {
      state.drag = 'p2';
    } else if (dl <= HIT_TOL) {
      state.drag = 'line';
      state.dragStart = { x, y, x1: state.x1, y1: state.y1, x2: state.x2, y2: state.y2 };
    } else {
      return;
    }

    e.preventDefault();
    updateSVGLine(id);
  });
}

// Mousemove & mouseup global agar drag tidak stuck saat kursor cepat keluar SVG
document.addEventListener('mousemove', (e) => {
  Object.entries(cameras).forEach(([id, state]) => {
    if (!state.drag) return;
    const svg = document.getElementById(`svg-${id}`);
    if (!svg) return;
    const { x, y, w, h } = getSVGPoint(e, svg);

    if (state.drag === 'p1') {
      state.x1 = Math.max(0, Math.min(1, x / w));
      state.y1 = Math.max(0, Math.min(1, y / h));
    } else if (state.drag === 'p2') {
      state.x2 = Math.max(0, Math.min(1, x / w));
      state.y2 = Math.max(0, Math.min(1, y / h));
    } else if (state.drag === 'line') {
      const ds = state.dragStart;
      const dx = (x - ds.x) / w;
      const dy = (y - ds.y) / h;
      state.x1 = Math.max(0, Math.min(1, ds.x1 + dx));
      state.y1 = Math.max(0, Math.min(1, ds.y1 + dy));
      state.x2 = Math.max(0, Math.min(1, ds.x2 + dx));
      state.y2 = Math.max(0, Math.min(1, ds.y2 + dy));
    }
    updateSVGLine(id);
  });
});

document.addEventListener('mouseup', () => {
  Object.entries(cameras).forEach(([id, state]) => {
    if (!state.drag) return;
    const prevDrag = state.drag;
    state.drag = null;
    state.dragStart = null;
    updateSVGLine(id);

    if (prevDrag) {
      fetch(`/cameras/${id}/line`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ x1: state.x1, y1: state.y1, x2: state.x2, y2: state.y2 }),
      });
    }
  });
});

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal() {
  document.getElementById('inputUrl').value    = '';
  document.getElementById('inputLabel').value  = '';
  document.getElementById('inputPreset').value = 'vertical';
  document.getElementById('formError').classList.remove('visible');
  document.getElementById('btnAdd').disabled    = false;
  document.getElementById('btnAdd').textContent = '+ Tambah';
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('inputUrl').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

function onModalBgClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

async function submitAdd() {
  const url    = document.getElementById('inputUrl').value.trim();
  const label  = document.getElementById('inputLabel').value.trim();
  const preset = document.getElementById('inputPreset').value;
  const { x1, y1, x2, y2 } = PRESETS[preset] || PRESETS['vertical'];

  const errEl = document.getElementById('formError');
  if (!url) {
    errEl.textContent = 'URL RTSP wajib diisi.';
    errEl.classList.add('visible');
    document.getElementById('inputUrl').focus();
    return;
  }

  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  btn.textContent = 'Menambahkan...';
  errEl.classList.remove('visible');

  try {
    const res = await fetch('/cameras', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, label, x1, y1, x2, y2 }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Gagal menambahkan kamera');
    closeModal();
    mountCard(data.id, label || url, x1, y1, x2, y2);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('visible');
    btn.disabled = false;
    btn.textContent = '+ Tambah';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
